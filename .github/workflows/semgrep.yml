name: semgrep

on:
  # PR-diff scans only. Push-triggered scans run in full-repo mode and
  # surface 52 pre-existing findings in scripts/ that are out of scope
  # for any single PR; PR mode reports only what the diff introduces.
  pull_request:

permissions: read-all

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: auto
