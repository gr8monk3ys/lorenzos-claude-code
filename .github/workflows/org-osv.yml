name: org-osv

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  osv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run OSV Scanner
        # `scan-repo` subaction was removed in v2.x; the root action handles repo scans now.
        # Pinned to v2.3.5.
        uses: google/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          fail-on-vuln: false
          upload-sarif: false
