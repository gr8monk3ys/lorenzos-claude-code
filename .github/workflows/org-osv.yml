name: org-osv

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  osv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run OSV Scanner
        # `scan-repo` subaction was removed in v2.x; the action lives at the
        # `osv-scanner-action` subdirectory now. Pinned to v2.3.5.
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          fail-on-vuln: false
          upload-sarif: false
