permissions: read-all

# Claude Code Automated PR Review
# Source: https://github.com/anthropics/claude-code-action
#
# This workflow enables Claude to review PRs when mentioned with @claude
# or automatically on PR open/sync.
#
# SETUP:
# 1. Run `/install-github-app` in Claude Code to set up the GitHub App
# 2. Add required secrets:
#    - ANTHROPIC_API_KEY: Your Anthropic API key
# 3. The GitHub App will automatically provide GITHUB_TOKEN

name: Claude PR Review

on:
  # Trigger on @claude mentions in comments
  issue_comment:
    types: [created]
  # Trigger on PR opened or updated
  pull_request:
    types: [opened, synchronize]

# Prevent concurrent runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only run on PRs (not issues) and when @claude is mentioned or on PR events
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      # Required by anthropics/claude-code-action for OIDC token exchange
      id-token: write

    steps:
      # The Claude action aborts the job when no credentials are present, which
      # turns this optional review into a hard CI failure on every PR. Gate the
      # action on a presence check so the job cleanly skips (and passes) when the
      # secret is not configured. Secrets are read via env (never interpolated
      # into the script) to avoid command injection.
      - name: Check for Anthropic credentials
        id: creds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude PR review — no ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN secret is configured."
          fi

      - name: Checkout repository
        if: steps.creds.outputs.present == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        if: steps.creds.outputs.present == 'true'
        uses: anthropics/claude-code-action@64c7a0ef71df67b14cb4471f4d9c8565c61042bf
        with:
          # Review instructions
          prompt: |
            Review this PR with focus on:
            1. Code quality and best practices
            2. TypeScript type safety (no any types)
            3. Next.js 15 App Router patterns
            4. Security vulnerabilities (OWASP Top 10)
            5. Performance implications
            6. Accessibility concerns

            For each issue found, provide:
            - Severity (Critical/High/Medium/Low)
            - Location (file:line)
            - Problem description
            - Suggested fix with code example

            Be constructive and actionable. Praise good patterns too.

          # Model selection and other flags now go through claude_args; the
          # standalone `model`, `allow_edits`, and `timeout_minutes` inputs were
          # removed from the action.
          claude_args: "--model claude-sonnet-4-6"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
