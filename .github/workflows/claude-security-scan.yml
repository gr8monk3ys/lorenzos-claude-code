permissions: read-all

# Claude Code Security Review
# Source: https://github.com/anthropics/claude-code-security-review
#
# AI-powered security vulnerability scanning using Claude.

name: Claude Security Scan

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.py'
      - '**.go'

concurrency:
  group: security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      security-events: write
      # Required by anthropics/claude-code-action for OIDC token exchange
      id-token: write

    steps:
      # Gate the Claude action on a credentials presence check so this optional
      # security review skips (and the job passes) when no secret is configured,
      # instead of hard-failing CI on every PR. Secrets are read via env (never
      # interpolated into the script) to avoid command injection.
      - name: Check for Anthropic credentials
        id: creds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude security review — no ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN secret is configured."
          fi

      - name: Checkout repository
        if: steps.creds.outputs.present == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run Claude Security Review
        if: steps.creds.outputs.present == 'true'
        uses: anthropics/claude-code-action@4633baf5267540f3f8cb58b684f79901d564c280
        with:
          prompt: |
            Perform a comprehensive security review of this PR.

            Check for:
            - Injection attacks (SQL, XSS, Command injection)
            - Authentication/Authorization issues
            - Data exposure (hardcoded secrets, PII)
            - Cryptographic weaknesses
            - OWASP Top 10 vulnerabilities

            For each issue:
            - Severity: CRITICAL/HIGH/MEDIUM/LOW
            - File and line number
            - Description of the risk
            - Suggested fix with code
          # Model selection moves to claude_args; the standalone `model` and
          # `timeout_minutes` inputs were removed from the action.
          claude_args: "--model claude-opus-4-8"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
